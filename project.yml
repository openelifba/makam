name: Makam
options:
  bundleIdPrefix: com.makam
targets:
  Makam:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Makam
    resources:
      - path: Makam/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Makam/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.makam.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: $(CI_BUILD_NUMBER)
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: RAYY6M6L8W
    entitlements:
      path: Makam/Makam.entitlements
      contents:
        com.apple.security.application-groups:
          - group.com.makam.shared
