name: Makam
options:
  bundleIdPrefix: com.yaysoftwares
targets:
  Makam:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Makam
    resources:
      - path: Makam/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Makam/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yaysoftwares.makam
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: RAYY6M6L8W
    entitlements:
      path: Makam/Makam.entitlements
